version: 1
backend:
  phases:
    build:
      commands:
        - corepack enable
        - pnpm config set store-dir .pnpm-store
        - |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile --prefer-offline
          else
            echo "pnpm-lock.yaml not found; continuing with a non-frozen install for this build."
            pnpm install --no-frozen-lockfile --prefer-offline
          fi
        - |
          if pnpm exec node ./node_modules/@aws-amplify/backend-cli/lib/ampx.js pipeline-deploy \
            --branch "${AWS_BRANCH}" \
            --app-id "${AWS_APP_ID}" \
            --outputs-out-dir .; then
            echo "Amplify backend deployed for ${AWS_BRANCH}."
          else
            echo "Amplify backend deploy failed. Attempting to generate outputs from the existing backend for ${AWS_BRANCH}."
            pnpm exec node ./node_modules/@aws-amplify/backend-cli/lib/ampx.js generate outputs \
              --app-id "${AWS_APP_ID}" \
              --branch "${AWS_BRANCH}" \
              --format json \
              --out-dir .
          fi
  artifacts:
    baseDirectory: .
    files:
      - amplify_outputs.json
  cache:
    paths:
      - amplify/.ampx
      - amplify/node_modules
      - node_modules/.cache/ampx
      - .pnpm-store
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - pnpm config set store-dir .pnpm-store
        - |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            echo "pnpm-lock.yaml not found; continuing with a non-frozen install for this build."
            pnpm install --no-frozen-lockfile
          fi
        # Create .env.production with public site config and email config from Amplify environment variables.
        - |
          cat > .env.production << EOF
          SITE_URL=https://www.restaurant-carpe-diem.de
          NEXT_PUBLIC_GA_ID=G-K6NB5FTD9H
          AWS_SES_REGION=${AWS_SES_REGION:-${AWS_REGION:-eu-central-1}}
          EMAIL_FROM=${EMAIL_FROM:-Carpe Diem <noreply@restaurant-carpe-diem.de>}
          RESERVATION_NOTIFICATION_TO=${RESERVATION_NOTIFICATION_TO:-info@restaurant-carpe-diem.de}
          CONTACT_NOTIFICATION_TO=${CONTACT_NOTIFICATION_TO:-${NOTIFICATION_TO:-info@restaurant-carpe-diem.de}}
          EMAIL_REPLY_TO=${EMAIL_REPLY_TO:-info@restaurant-carpe-diem.de}
          RESTAURANT_CONTACT_EMAIL=${RESTAURANT_CONTACT_EMAIL:-info@restaurant-carpe-diem.de}
          RESTAURANT_PHONE=${RESTAURANT_PHONE:-+49 30 711 36 44}
          EOF
    build:
      commands:
        - SITE_URL=https://www.restaurant-carpe-diem.de NEXT_PUBLIC_GA_ID=G-K6NB5FTD9H pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .pnpm-store
      - .next/cache/**/*
