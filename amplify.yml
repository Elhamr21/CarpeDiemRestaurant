version: 1
backend:
  phases:
    build:
      commands:
        - corepack enable
        - pnpm config set store-dir .pnpm-store
        - pnpm install --frozen-lockfile --prefer-offline
        - |
          if pnpm exec node ./node_modules/@aws-amplify/backend-cli/lib/ampx.js pipeline-deploy \
            --branch "${AWS_BRANCH}" \
            --app-id "${AWS_APP_ID}" \
            --outputs-out-dir .; then
            echo "Amplify backend deployed for ${AWS_BRANCH}."
          else
            echo "Amplify backend deploy failed. Attempting to generate outputs from the existing backend for ${AWS_BRANCH}."
            pnpm exec node ./node_modules/@aws-amplify/backend-cli/lib/ampx.js generate outputs \
              --app-id "${AWS_APP_ID}" \
              --branch "${AWS_BRANCH}" \
              --format json \
              --out-dir .
          fi
  artifacts:
    baseDirectory: .
    files:
      - amplify_outputs.json
  cache:
    paths:
      - amplify/.ampx
      - amplify/node_modules
      - node_modules/.cache/ampx
      - .pnpm-store
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - pnpm config set store-dir .pnpm-store
        - pnpm install --frozen-lockfile
        # Create .env.production with email config from Amplify environment variables
        - |
          cat > .env.production << EOF
          RESEND_API_KEY=${RESEND_API_KEY}
          EMAIL_FROM=${EMAIL_FROM:-Carpe Diem <reservierung@carpe-diem.de>}
          NOTIFICATION_TO=${NOTIFICATION_TO:-reservierung@carpe-diem.de}
          EOF
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .pnpm-store
      - .next/cache/**/*
